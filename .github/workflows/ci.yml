name: CI

on:
  push:
    branches:
      - main
      - master
      - qa
      - develop
      - dev
      - "feature/**"
      - "feat/**"
      - "fix/**"
      - "chore/**"
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Dagster package
        run: python -m compileall hydrosat_dagster tests

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Dagster image
        run: docker build -t hydrosat-dagster:ci .
