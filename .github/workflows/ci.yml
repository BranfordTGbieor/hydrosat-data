name: CI

on:
  push:
    branches:
      - main
      - master
      - qa
      - develop
      - dev
      - "feature/**"
      - "feat/**"
      - "fix/**"
      - "chore/**"
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      runtime: ${{ steps.filter.outputs.runtime }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect runtime-impacting changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            runtime:
              - '.github/workflows/ci.yml'
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'hydrosat_dagster/**'
              - 'tests/**'
              - 'dbt/**'

  checks:
    name: Checks
    runs-on: ubuntu-latest
    needs: changes
    if: github.ref_type == 'tag' || needs.changes.outputs.runtime == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Dagster package
        run: python -m compileall hydrosat_dagster tests

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs:
      - changes
      - checks
    if: github.ref_type == 'tag' || needs.changes.outputs.runtime == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  dbt-validate:
    name: dbt Validate
    runs-on: ubuntu-latest
    needs:
      - changes
      - test
    if: github.ref_type == 'tag' || needs.changes.outputs.runtime == 'true'
    env:
      HYDROSAT_BATCH_DATE: "2026-04-07"
      HYDROSAT_DUCKDB_PATH: /tmp/hydrosat-ci/hydrosat.duckdb
      HYDROSAT_RAW_URI: /tmp/hydrosat-ci/raw/sample.jsonl
      HYDROSAT_STAGING_URI: /tmp/hydrosat-ci/staging/sample.jsonl
      HYDROSAT_CURATED_URI: /tmp/hydrosat-ci/curated/sample.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Prepare dbt sample input
        run: |
          mkdir -p /tmp/hydrosat-ci/raw /tmp/hydrosat-ci/staging /tmp/hydrosat-ci/curated
          cat > "${HYDROSAT_RAW_URI}" <<'EOF'
          {"batch_id":"ci-batch","scene_id":"scene-001","tile_id":"T31UFQ","captured_at":"2026-04-07T10:15:00Z","surface_temp_c":27.4,"ndvi":0.82,"cloud_cover_pct":4.1}
          {"batch_id":"ci-batch","scene_id":"scene-002","tile_id":"T31UGQ","captured_at":"2026-04-07T10:20:00Z","surface_temp_c":28.1,"ndvi":0.79,"cloud_cover_pct":6.5}
          EOF

      - name: Run dbt build
        run: |
          python -m dbt.cli.main build \
            --project-dir dbt \
            --profiles-dir dbt \
            --target hydrosat

      - name: Validate export macro
        run: |
          python -m dbt.cli.main run-operation export_lake_outputs \
            --project-dir dbt \
            --profiles-dir dbt \
            --target hydrosat

          test -s "${HYDROSAT_STAGING_URI}"
          test -s "${HYDROSAT_CURATED_URI}"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - changes
      - dbt-validate
    if: github.ref_type == 'tag' || needs.changes.outputs.runtime == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Dagster image
        run: docker build -t hydrosat-dagster:ci .

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - changes
      - build
    if: github.event_name == 'push' && (github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/v')) && (github.ref_type == 'tag' || needs.changes.outputs.runtime == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: meta
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            image_tags="${{ vars.DOCKERHUB_REPOSITORY }}:${GITHUB_REF_NAME}"
          else
            image_tags="${{ vars.DOCKERHUB_REPOSITORY }}:latest"
          fi

          printf 'tags<<EOF\n%s\nEOF\n' "${image_tags}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Notify infra repo of released image tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HYDROSAT_INFRA_REPO_TOKEN }}
          repository: BranfordTGbieor/hydrosat-infra
          event-type: promote-dagster-image
          client-payload: >-
            {
              "image_repository": "docker.io/${{ vars.DOCKERHUB_REPOSITORY }}",
              "image_tag": "${{ github.ref_name }}",
              "source_repository": "${{ github.repository }}",
              "source_sha": "${{ github.sha }}"
            }
