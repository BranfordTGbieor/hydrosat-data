name: CI

on:
  push:
    branches:
      - main
      - master
      - qa
      - develop
      - dev
      - "feature/**"
      - "feat/**"
      - "fix/**"
      - "chore/**"
    tags:
      - "v*"
    paths:
      - ".github/workflows/ci.yml"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "sight_poc_dagster/**"
      - "tests/**"
      - "dbt/**"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "sight_poc_dagster/**"
      - "tests/**"
      - "dbt/**"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

concurrency:
  group: sight-poc-data-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      workflow: ${{ steps.filter.outputs.workflow }}
      python: ${{ steps.filter.outputs.python }}
      dbt: ${{ steps.filter.outputs.dbt }}
      image: ${{ steps.filter.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect CI-impacting changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            workflow:
              - '.github/workflows/ci.yml'
            python:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'sight_poc_dagster/**'
              - 'tests/**'
            dbt:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'dbt/**'
            image:
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'sight_poc_dagster/**'
              - 'dbt/**'

  checks:
    name: Checks
    runs-on: ubuntu-latest
    needs: changes
    if: >
      github.ref_type == 'tag' ||
      needs.changes.outputs.workflow == 'true' ||
      needs.changes.outputs.python == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync project environment
        run: uv sync --all-extras

      - name: Compile package
        run: uv run python -m compileall sight_poc_dagster tests

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs:
      - changes
      - checks
    if: >
      github.ref_type == 'tag' ||
      needs.changes.outputs.workflow == 'true' ||
      needs.changes.outputs.python == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync project environment
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest

  dbt-validate:
    name: dbt Validate
    runs-on: ubuntu-latest
    needs:
      - changes
      - test
    if: >
      always() &&
      (
        github.ref_type == 'tag' ||
        needs.changes.outputs.workflow == 'true' ||
        needs.changes.outputs.dbt == 'true'
      ) &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    env:
      SIGHT_POC_BATCH_DATE: "2026-04-07"
      SIGHT_POC_DUCKDB_PATH: /tmp/sight-poc-ci/sight-poc.duckdb
      SIGHT_POC_RAW_URI: /tmp/sight-poc-ci/raw/sample.jsonl
      SIGHT_POC_STAGING_URI: /tmp/sight-poc-ci/staging/sample.jsonl
      SIGHT_POC_CURATED_URI: /tmp/sight-poc-ci/curated/sample.json
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync project environment
        run: uv sync --all-extras

      - name: Prepare dbt sample input
        run: |
          mkdir -p /tmp/sight-poc-ci/raw /tmp/sight-poc-ci/staging /tmp/sight-poc-ci/curated
          cat > "${SIGHT_POC_RAW_URI}" <<'EOF'
          {"batch_id":"ci-batch","scene_id":"scene-001","tile_id":"T31UFQ","captured_at":"2026-04-07T10:15:00Z","surface_temp_c":27.4,"ndvi":0.82,"cloud_cover_pct":4.1}
          {"batch_id":"ci-batch","scene_id":"scene-002","tile_id":"T31UGQ","captured_at":"2026-04-07T10:20:00Z","surface_temp_c":28.1,"ndvi":0.79,"cloud_cover_pct":6.5}
          EOF

      - name: Run dbt build
        run: |
          uv run python -m dbt.cli.main build \
            --project-dir dbt \
            --profiles-dir dbt \
            --target sight_poc

      - name: Validate export macro
        run: |
          uv run python -m dbt.cli.main run-operation export_lake_outputs \
            --project-dir dbt \
            --profiles-dir dbt \
            --target sight_poc

          test -s "${SIGHT_POC_STAGING_URI}"
          test -s "${SIGHT_POC_CURATED_URI}"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - changes
      - test
      - dbt-validate
    if: >
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.dbt-validate.result == 'success' || needs.dbt-validate.result == 'skipped') &&
      (
        github.ref_type == 'tag' ||
        needs.changes.outputs.image == 'true'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Dagster image
        run: docker build -t sight-poc-dagster:ci .

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - changes
      - build
    if: >
      always() &&
      needs.build.result == 'success' &&
      github.event_name == 'push' &&
      (github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/v')) &&
      (
        github.ref_type == 'tag' ||
        needs.changes.outputs.image == 'true'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve image tags
        id: meta
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            image_tags="${{ vars.DOCKERHUB_REPOSITORY }}:${GITHUB_REF_NAME}"
          else
            image_tags="${{ vars.DOCKERHUB_REPOSITORY }}:latest"
          fi

          printf 'tags<<EOF\n%s\nEOF\n' "${image_tags}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Notify infra repo of released image tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SIGHT_POC_INFRA_REPO_TOKEN }}
          repository: BranfordTGbieor/sight-poc-infra
          event-type: promote-dagster-image
          client-payload: >-
            {
              "image_repository": "docker.io/${{ vars.DOCKERHUB_REPOSITORY }}",
              "image_tag": "${{ github.ref_name }}",
              "source_repository": "${{ github.repository }}",
              "source_sha": "${{ github.sha }}"
            }
